# ============================================================
#  CONFIGURACIÓN DE EMPRESA
#  Edita este archivo con los datos de tu empresa.
#  Coloca el logo en config/logo.png
# ============================================================

company:
  name: "TechSolucions Test S.L."
  cif: "B87654321"
  address: "Carrer de Provença 42, 08029 Barcelona, España"
  phone: "+34 932 000 001"
  email: "facturacio@techsolucions-test.com"
  logo_path: "config/logo.png"   # Ruta al logo (PNG/JPG, 300x150 px recomendado)

invoice:
  tax_rate: 21            # Porcentaje de IVA
  currency: "EUR"
  currency_symbol: "€"
  payment_terms: "30 días"
  bank_account: "ES91 2100 0418 4502 0005 1332"

review:
  # "auto"   → la factura se envía al cliente inmediatamente (a tu propio riesgo;
  #            corrige con una factura rectificativa si algo falla).
  # "manual" → la factura queda pendiente de revisión en la página web antes de enviarse.
  mode: "manual"
  # Emails autorizados a iniciar sesión en la página de revisión.
  reviewers:
    - "gerardcampspinto136@gmail.com"
  notify:
    channels: ["telegram"]     # dónde avisar: "telegram", "email" o ambos
    schedule: "1d"             # cada cuánto recordar las facturas pendientes: 1d, 3d, 1w, 2w
    email: ""                  # email que recibe el aviso (si channels incluye "email")
    telegram_chat_id: 0        # chat de Telegram que recibe el aviso (si incluye "telegram")
  web:
    base_url: "http://localhost:8000"   # URL usada en los enlaces (usa la del túnel para el móvil)
    host: "127.0.0.1"
    port: 8000

email:
  subject_template: "Factura {invoice_number} - {company_name}"
  body_template: |
    Estimado/a {client_name},

    Adjunto encontrará la factura {invoice_number} correspondiente a nuestros servicios,
    por un importe total de {total}.

    Quedo a su disposición para cualquier consulta.

    Un cordial saludo,
    {company_name}
    {company_phone}
    {company_email}
